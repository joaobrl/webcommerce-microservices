apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-produtos-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-produtos
  template:
    metadata:
      labels:
        app: api-produtos
    spec:
      containers:
        - name: api-produtos
          image: api-produtos:latest
          imagePullPolicy: Never
          envFrom:
            - configMapRef:
                name: api-produtos-config
            - secretRef:
                name: db-produtos-secret
          ports:
            - containerPort: 8080
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "500m"

            # Health Checks
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10