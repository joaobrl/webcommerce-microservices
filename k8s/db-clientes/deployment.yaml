apiVersion: apps/v1
kind: Deployment
metadata:
  name: db-clientes
spec:
  replicas: 1
  selector:
    matchLabels:
      app: db-clientes
  template:
    metadata:
      labels:
        app: db-clientes
    spec:
      containers:
        - name: postgres
          image: postgres:14
          env:
            - name: POSTGRES_DB
              value: clientes_db
            - name: POSTGRES_USER
              value: postgres
            - name: POSTGRES_PASSWORD
              value: postgres
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: db-data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: db-data
          persistentVolumeClaim:
            claimName: db-clientes-pvc