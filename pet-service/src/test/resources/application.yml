spring:
  main:
    allow-bean-definition-overriding: true
  datasource:
    url: jdbc:h2:mem:testdb
    username: sa
    password: ""
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

server:
  port: 8080

# Propriedades exclusivas para a execução dos testes
external:
  api:
    customer-management:
      url: localhost:8080 # Valor dummy apenas para o Feign compilar a URL sem dar erro

